name: Publish to crates.io

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: Publish crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # Publish in dependency order (libs first, then main binary)
          # Wait between publishes for crates.io to index
          for crate in libbrat-config libbrat-worktree libbrat-grite libbrat-engine libbrat-session libbrat-workflow brat; do
            echo "Publishing $crate..."
            cargo publish -p $crate --no-verify || echo "Warning: $crate publish failed (may already exist)"
            echo "Waiting for crates.io to index..."
            sleep 30
          done
