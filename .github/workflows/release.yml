name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_release:
        description: "Force release even if version unchanged"
        required: false
        default: "false"

env:
  CARGO_TERM_COLOR: always

jobs:
  # Check if release is needed
  check-version:
    name: Check Version
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history for tags

      - name: Check version change
        id: check
        run: |
          # Extract version from workspace Cargo.toml
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Get latest release tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          LATEST_VERSION=${LATEST_TAG#v}

          echo "Current version: $VERSION"
          echo "Latest tag version: $LATEST_VERSION"

          # Check if we should release
          if [ "$VERSION" != "$LATEST_VERSION" ] || [ "${{ github.event.inputs.force_release }}" = "true" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "Release needed: version changed from $LATEST_VERSION to $VERSION"
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "No release needed: version unchanged at $VERSION"
          fi

  # Build binaries for all platforms
  build-binaries:
    name: Build (${{ matrix.target }})
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: brat-linux-x86_64
            binary_ext: ""
          # Linux ARM64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: brat-linux-aarch64
            binary_ext: ""
            cross: true
          # macOS x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: brat-macos-x86_64
            binary_ext: ""
          # macOS ARM64 (Apple Silicon)
          - os: macos-14
            target: aarch64-apple-darwin
            artifact_name: brat-macos-aarch64
            binary_ext: ""
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: brat-windows-x86_64
            binary_ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      # Install cross for ARM64 Linux
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      # Native build
      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      # Cross build
      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      # Package binary (Unix)
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../${{ matrix.artifact_name }}.tar.gz brat

      # Package binary (Windows)
      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.artifact_name }}.zip brat.exe

      # Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}.tar.gz
            ${{ matrix.artifact_name }}.zip
          if-no-files-found: error

  # Build Linux packages (deb, rpm)
  build-linux-packages:
    name: Build Linux Packages
    needs: [check-version, build-binaries]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux x86_64 binary
        uses: actions/download-artifact@v4
        with:
          name: brat-linux-x86_64

      - name: Download Linux ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: brat-linux-aarch64

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm ruby ruby-dev rubygems build-essential
          sudo gem install fpm

      - name: Extract binaries
        run: |
          mkdir -p pkg/x86_64 pkg/aarch64
          tar -xzf brat-linux-x86_64.tar.gz -C pkg/x86_64
          tar -xzf brat-linux-aarch64.tar.gz -C pkg/aarch64

      - name: Build .deb (x86_64)
        run: |
          fpm -s dir -t deb \
            -n brat \
            -v ${{ needs.check-version.outputs.version }} \
            -a amd64 \
            --description "Brat - Multi-agent coding orchestrator" \
            --license "MIT OR Apache-2.0" \
            --url "https://github.com/${{ github.repository }}" \
            pkg/x86_64/brat=/usr/local/bin/brat

      - name: Build .deb (ARM64)
        run: |
          fpm -s dir -t deb \
            -n brat \
            -v ${{ needs.check-version.outputs.version }} \
            -a arm64 \
            --description "Brat - Multi-agent coding orchestrator" \
            --license "MIT OR Apache-2.0" \
            --url "https://github.com/${{ github.repository }}" \
            pkg/aarch64/brat=/usr/local/bin/brat

      - name: Build .rpm (x86_64)
        run: |
          fpm -s dir -t rpm \
            -n brat \
            -v ${{ needs.check-version.outputs.version }} \
            -a x86_64 \
            --description "Brat - Multi-agent coding orchestrator" \
            --license "MIT OR Apache-2.0" \
            --url "https://github.com/${{ github.repository }}" \
            pkg/x86_64/brat=/usr/local/bin/brat

      - name: Build .rpm (ARM64)
        run: |
          fpm -s dir -t rpm \
            -n brat \
            -v ${{ needs.check-version.outputs.version }} \
            -a aarch64 \
            --description "Brat - Multi-agent coding orchestrator" \
            --license "MIT OR Apache-2.0" \
            --url "https://github.com/${{ github.repository }}" \
            pkg/aarch64/brat=/usr/local/bin/brat

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            *.deb
            *.rpm

  # Create GitHub Release
  create-release:
    name: Create Release
    needs: [check-version, build-binaries, build-linux-packages]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.deb" -o -name "*.rpm" \) -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: Brat v${{ needs.check-version.outputs.version }}
          draft: false
          prerelease: ${{ contains(needs.check-version.outputs.version, '-') }}
          generate_release_notes: true
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
